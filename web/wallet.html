<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f12">
    <title>kcart — Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"/>
    <link rel="stylesheet" href="assets/css/app.css">
    <style>html{background:#0b0b10;}</style>
</head>
<body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <header class="nav glass nav--primary animate__animated animate__fadeInDown">
        <div class="nav__left">
            <a class="pill pill--ghost" href="index.html">← Back</a>
        </div>
        <div class="nav__right">
            <div class="brand">Wallet</div>
        </div>
    </header>

    <main class="container">
        <section class="hero animate__animated animate__fadeInUp">
            <div class="card" style="padding:16px; display:grid; gap:8px;">
                <div style="display:flex; align-items:center; justify-content:space-between;">
                    <span>Balance</span>
                    <i class="ri-wallet-3-line"></i>
                </div>
                <div style="font-size:28px; font-weight:800;">$247.80</div>
                <div style="display:flex; gap:8px;">
                    <button class="pill"><i class="ri-add-line"></i>&nbsp;Add</button>
                    <button class="pill pill--ghost"><i class="ri-send-plane-2-line"></i>&nbsp;Send</button>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section__head">
                <h2 class="section__title">Recent</h2>
            </div>
            <div class="list">
                <a class="item" href="#" style="display:grid; grid-template-columns: 1fr auto; align-items:center;">
                    <div>
                        <div style="font-weight:700;">Order #10234</div>
                        <div class="card__meta">Yesterday • Pizza Place</div>
                    </div>
                    <div style="color:#a7e8bd;">-$18.90</div>
                </a>
                <a class="item" href="#" style="display:grid; grid-template-columns: 1fr auto; align-items:center;">
                    <div>
                        <div style="font-weight:700;">Top-up</div>
                        <div class="card__meta">2 days ago • Card **** 1123</div>
                    </div>
                    <div style="color:#ffd972;">+$50.00</div>
                </a>
            </div>
        </section>
    </main>

    <nav class="tabbar glass">
        <a class="tab" href="index.html"><i class="ri-home-5-line"></i><span>Home</span></a>
        <a class="tab" href="explore.html"><i class="ri-compass-3-line"></i><span>Explore</span></a>
        <a class="tab tab--active" href="wallet.html"><i class="ri-wallet-3-line"></i><span>Wallet</span></a>
        <a class="tab" href="profile.html"><i class="ri-user-3-line"></i><span>Profile</span></a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="assets/js/data/placeholders.js"></script>
    <script src="assets/js/ui/threebg.js"></script>
    <script src="assets/js/ui/animations.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
